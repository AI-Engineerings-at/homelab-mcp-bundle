<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=1280">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    width: 1280px; height: 720px; overflow: hidden;
    background: #0F172A;
    font-family: 'Inter', 'Segoe UI', system-ui, sans-serif;
    color: #F8FAFC;
    display: flex; align-items: center; justify-content: center;
  }
  .container {
    width: 1280px; height: 720px;
    background: linear-gradient(135deg, #0F172A 0%, #0D1B2A 50%, #0F172A 100%);
    position: relative;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    padding: 60px;
  }
  /* Grid background lines */
  .container::before {
    content: '';
    position: absolute; inset: 0;
    background-image:
      linear-gradient(rgba(6,182,212,0.07) 1px, transparent 1px),
      linear-gradient(90deg, rgba(6,182,212,0.07) 1px, transparent 1px);
    background-size: 60px 60px;
  }
  /* Glow effect */
  .container::after {
    content: '';
    position: absolute;
    width: 700px; height: 400px;
    background: radial-gradient(ellipse, rgba(6,182,212,0.12) 0%, transparent 70%);
    top: 50%; left: 50%; transform: translate(-50%, -50%);
  }
  .badge-price {
    position: absolute;
    top: 40px; right: 50px;
    background: #10B981;
    color: white;
    font-size: 28px; font-weight: 800;
    padding: 12px 28px;
    border-radius: 50px;
    letter-spacing: 0.5px;
    z-index: 10;
    box-shadow: 0 4px 20px rgba(16,185,129,0.4);
  }
  .badge-category {
    position: absolute;
    top: 40px; left: 50px;
    background: rgba(6,182,212,0.15);
    border: 1px solid rgba(6,182,212,0.4);
    color: #67E8F9;
    font-size: 16px; font-weight: 600;
    padding: 10px 22px;
    border-radius: 50px;
    letter-spacing: 1px;
    text-transform: uppercase;
    z-index: 10;
  }
  .content { position: relative; z-index: 10; text-align: center; }
  .icon {
    font-size: 80px;
    margin-bottom: 20px;
    display: block;
    filter: drop-shadow(0 0 30px rgba(6,182,212,0.7));
  }
  h1 {
    font-size: 58px; font-weight: 800;
    color: #F8FAFC;
    line-height: 1.1;
    margin-bottom: 12px;
    text-shadow: 0 2px 20px rgba(0,0,0,0.5);
  }
  .subtitle {
    font-size: 24px; font-weight: 400;
    color: #94A3B8;
    margin-bottom: 36px;
  }
  .servers {
    display: flex; gap: 12px; justify-content: center;
    flex-wrap: wrap;
    margin-bottom: 28px;
  }
  .server {
    background: rgba(6,182,212,0.12);
    border: 1px solid rgba(6,182,212,0.3);
    color: #A5F3FC;
    font-size: 15px; font-weight: 500;
    padding: 9px 18px;
    border-radius: 8px;
  }
  .stats {
    display: flex; gap: 40px; justify-content: center;
    margin-top: 4px;
  }
  .stat {
    text-align: center;
  }
  .stat-num {
    font-size: 42px; font-weight: 800;
    color: #22D3EE;
    line-height: 1;
  }
  .stat-label {
    font-size: 14px; font-weight: 500;
    color: #64748B;
    text-transform: uppercase;
    letter-spacing: 1px;
    margin-top: 4px;
  }
  .footer {
    position: absolute;
    bottom: 32px;
    color: #475569;
    font-size: 15px;
    letter-spacing: 2px;
    text-transform: uppercase;
  }
</style>
</head>
<body>
<div class="container">
  <div class="badge-category">MCP · Model Context Protocol</div>
  <div class="badge-price">FREE</div>
  <div class="content">
    <span class="icon">🔌</span>
    <h1>Homelab MCP Bundle</h1>
    <p class="subtitle">Give Claude full access to your self-hosted infrastructure</p>
    <div class="servers">
      <span class="server">🗨️ Mattermost</span>
      <span class="server">⚙️ n8n</span>
      <span class="server">🖥️ Proxmox</span>
      <span class="server">📡 Uptime Kuma</span>
      <span class="server">🤖 Ollama</span>
    </div>
    <div class="stats">
      <div class="stat">
        <div class="stat-num">5</div>
        <div class="stat-label">MCP Servers</div>
      </div>
      <div class="stat">
        <div class="stat-num">31</div>
        <div class="stat-label">Tools</div>
      </div>
      <div class="stat">
        <div class="stat-num">MIT</div>
        <div class="stat-label">License</div>
      </div>
    </div>
  </div>
  <div class="footer">ai-engineering.at · Self-Hosted · GDPR-Friendly</div>
</div>
</body>
</html>
