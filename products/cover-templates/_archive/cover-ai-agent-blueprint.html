<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=1280">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    width: 1280px; height: 720px; overflow: hidden;
    background: #0F172A;
    font-family: 'Inter', 'Segoe UI', system-ui, sans-serif;
    color: #F8FAFC;
  }
  .container {
    width: 1280px; height: 720px;
    background: linear-gradient(135deg, #0F172A 0%, #1E1B4B 50%, #0F172A 100%);
    position: relative;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    padding: 60px;
  }
  .container::before {
    content: '';
    position: absolute; inset: 0;
    background-image:
      linear-gradient(rgba(167,139,250,0.07) 1px, transparent 1px),
      linear-gradient(90deg, rgba(167,139,250,0.07) 1px, transparent 1px);
    background-size: 60px 60px;
  }
  /* Agent nodes in background */
  .agent-nodes {
    position: absolute; inset: 0;
    opacity: 0.12;
  }
  .node {
    position: absolute;
    width: 70px; height: 70px;
    border: 2px solid #A78BFA;
    border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    font-size: 28px;
  }
  .line {
    position: absolute;
    height: 2px;
    background: linear-gradient(90deg, #A78BFA, transparent);
    transform-origin: left center;
  }
  .container::after {
    content: '';
    position: absolute;
    width: 600px; height: 500px;
    background: radial-gradient(ellipse, rgba(139,92,246,0.18) 0%, transparent 70%);
    top: 50%; left: 50%; transform: translate(-50%, -50%);
  }
  .badge-price {
    position: absolute;
    top: 40px; right: 50px;
    background: #10B981;
    color: white;
    font-size: 28px; font-weight: 800;
    padding: 12px 28px;
    border-radius: 50px;
    z-index: 10;
    box-shadow: 0 4px 20px rgba(16,185,129,0.4);
  }
  .badge-category {
    position: absolute;
    top: 40px; left: 50px;
    background: rgba(139,92,246,0.2);
    border: 1px solid rgba(139,92,246,0.5);
    color: #C4B5FD;
    font-size: 16px; font-weight: 600;
    padding: 10px 22px;
    border-radius: 50px;
    letter-spacing: 1px;
    text-transform: uppercase;
    z-index: 10;
  }
  .content { position: relative; z-index: 10; text-align: center; }
  .icon {
    font-size: 88px;
    margin-bottom: 24px;
    display: block;
    filter: drop-shadow(0 0 30px rgba(167,139,250,0.8));
  }
  h1 {
    font-size: 60px; font-weight: 800;
    color: #F8FAFC;
    line-height: 1.1;
    margin-bottom: 16px;
  }
  .subtitle {
    font-size: 26px; font-weight: 400;
    color: #94A3B8;
    margin-bottom: 40px;
  }
  .agents-row {
    display: flex; gap: 20px; justify-content: center;
    margin-bottom: 20px;
  }
  .agent-chip {
    background: rgba(139,92,246,0.15);
    border: 1px solid rgba(139,92,246,0.4);
    color: #C4B5FD;
    font-size: 18px; font-weight: 600;
    padding: 12px 24px;
    border-radius: 12px;
    display: flex; align-items: center; gap: 8px;
  }
  .features {
    display: flex; gap: 14px; justify-content: center; flex-wrap: wrap;
  }
  .feature {
    background: rgba(139,92,246,0.1);
    border: 1px solid rgba(139,92,246,0.25);
    color: #DDD6FE;
    font-size: 16px; font-weight: 500;
    padding: 9px 18px;
    border-radius: 8px;
  }
  .footer {
    position: absolute;
    bottom: 32px;
    color: #475569;
    font-size: 15px;
    letter-spacing: 2px;
    text-transform: uppercase;
    z-index: 10;
  }
</style>
</head>
<body>
<div class="container">
  <div class="badge-category">Multi-Agent AI</div>
  <div class="badge-price">EUR 19</div>
  <div class="content">
    <span class="icon">🤖</span>
    <h1>AI Agent Team Blueprint</h1>
    <p class="subtitle">Baue dein eigenes KI-Agenten-Team</p>
    <div class="agents-row">
      <div class="agent-chip">@jim — Manager</div>
      <div class="agent-chip">@lisa01 — Dev</div>
      <div class="agent-chip">@john01 — QA</div>
    </div>
    <div class="features">
      <span class="feature">✅ n8n + Mattermost</span>
      <span class="feature">✅ Self-Hosted</span>
      <span class="feature">✅ DSGVO-konform</span>
      <span class="feature">✅ Sofort nutzbar</span>
    </div>
  </div>
  <div class="footer">ai-engineering.at · Multi-Agent · DACH-kompatibel</div>
</div>
</body>
</html>
