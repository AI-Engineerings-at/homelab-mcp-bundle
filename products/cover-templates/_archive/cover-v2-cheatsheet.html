<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body {
    width: 800px; height: 800px; overflow: hidden;
    background: #0F172A;
    font-family: 'Inter', 'Segoe UI', system-ui, sans-serif;
    color: #F8FAFC;
  }
  .container {
    width: 800px; height: 800px;
    background: linear-gradient(145deg, #0F172A 0%, #051a1f 55%, #0F172A 100%);
    position: relative;
    display: flex; flex-direction: column;
    overflow: hidden;
  }
  .container::before {
    content: '';
    position: absolute; inset: 0;
    background-image:
      linear-gradient(rgba(34,211,238,0.04) 1px, transparent 1px),
      linear-gradient(90deg, rgba(34,211,238,0.04) 1px, transparent 1px);
    background-size: 40px 40px;
    z-index: 1;
  }
  .glow-center {
    position: absolute;
    width: 700px; height: 700px;
    background: radial-gradient(ellipse, rgba(34,211,238,0.07) 0%, transparent 65%);
    top: 50%; left: 50%; transform: translate(-50%, -50%);
    z-index: 2;
  }
  .eagle-bg {
    position: absolute;
    width: 420px; height: 420px;
    bottom: 80px; right: -30px;
    opacity: 0.06;
    z-index: 3;
  }
  .eagle-bg img { width: 100%; height: 100%; object-fit: contain; }
  /* HEADER */
  .header {
    position: relative; z-index: 20;
    display: flex; align-items: center; justify-content: space-between;
    padding: 24px 36px 0;
    flex-shrink: 0;
  }
  .brand {
    display: flex; align-items: center; gap: 10px;
  }
  .brand img {
    width: 36px; height: 36px; object-fit: contain;
    filter: drop-shadow(0 0 10px rgba(34,211,238,0.4));
  }
  .brand-name {
    font-size: 12px; font-weight: 700; color: #475569;
    letter-spacing: 1.5px; text-transform: uppercase;
  }
  .badge-cat {
    background: rgba(34,211,238,0.12);
    border: 1px solid rgba(34,211,238,0.45);
    color: #22D3EE;
    font-size: 10px; font-weight: 800;
    padding: 5px 16px; border-radius: 50px;
    letter-spacing: 2.5px; text-transform: uppercase;
    font-family: 'Courier New', monospace;
  }
  /* MAIN CONTENT */
  .main {
    position: relative; z-index: 10;
    padding: 20px 40px 0;
    flex-shrink: 0;
  }
  h1 {
    font-size: 62px; font-weight: 900;
    line-height: 1.0; letter-spacing: -2px;
    margin-bottom: 10px;
  }
  h1 .accent { color: #22D3EE; }
  .tagline {
    font-size: 17px; font-weight: 400;
    color: #94A3B8; line-height: 1.4;
    margin-bottom: 6px;
  }
  .outcome {
    font-size: 14px; font-weight: 600;
    color: #22D3EE; opacity: 0.8;
    font-family: 'Courier New', monospace;
    letter-spacing: 0.5px;
  }
  /* SVG VISUAL */
  .visual {
    position: relative; z-index: 10;
    padding: 14px 32px 0;
    flex: 1;
    display: flex; align-items: flex-start;
  }
  .visual-inner {
    background: rgba(15,23,42,0.5);
    border: 1px solid rgba(34,211,238,0.2);
    border-radius: 12px;
    padding: 8px;
    width: 100%;
    box-shadow: 0 0 40px rgba(34,211,238,0.06);
  }
  /* STATS */
  .stats {
    position: relative; z-index: 20;
    display: flex; gap: 0;
    margin: 12px 0 0;
    flex-shrink: 0;
    border-top: 1px solid rgba(255,255,255,0.05);
  }
  .stat {
    flex: 1;
    padding: 12px 0;
    text-align: center;
    border-right: 1px solid rgba(255,255,255,0.05);
  }
  .stat:last-child { border-right: none; }
  .stat-num {
    font-size: 22px; font-weight: 900;
    color: #22D3EE;
    line-height: 1.1;
    display: block;
  }
  .stat-label {
    font-size: 10px; font-weight: 600;
    color: #475569;
    letter-spacing: 1px;
    text-transform: uppercase;
    font-family: 'Courier New', monospace;
  }
  /* FOOTER */
  .footer {
    position: relative; z-index: 20;
    display: flex; align-items: center; justify-content: center;
    gap: 10px;
    padding: 10px 0 14px;
    border-top: 1px solid rgba(34,211,238,0.12);
    flex-shrink: 0;
  }
  .footer-text {
    font-size: 11px; font-weight: 700;
    color: #22D3EE; opacity: 0.7;
    letter-spacing: 2.5px; text-transform: uppercase;
    font-family: 'Courier New', monospace;
  }
  .footer-sep { color: rgba(255,255,255,0.15); }
  .footer-sub {
    font-size: 10px; color: #334155;
    letter-spacing: 1px;
  }
</style>
</head>
